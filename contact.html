<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | harshh_b_arts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init("WHUIF8OpbQITnZD51");
        })();
    </script>
</head>
<body>
    <header class="sticky-header">
        <nav class="container">
            <div class="logo">harshh_b_arts</div>
            <div class="menu-toggle" id="mobile-menu">
                <i class="fas fa-bars"></i>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html" class="active-link">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="contact container reveal active">
        <h2 class="playfair">Get in Touch</h2>
        <div class="contact-content" style="max-width: 800px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 40px;">
            <div class="contact-info">
                <h3 class="playfair" style="margin-bottom: 20px;">Contact Information</h3>
                <p style="margin-bottom: 15px;"><i class="fab fa-instagram" style="color: var(--gold); margin-right: 10px;"></i> @harshh_b_arts</p>
                <p style="margin-bottom: 15px;"><i class="fas fa-phone" style="color: var(--gold); margin-right: 10px;"></i> +91 9881413638</p>
                <p style="margin-bottom: 15px;"><i class="fas fa-envelope" style="color: var(--gold); margin-right: 10px;"></i> artbyharshal@gmail.com</p>
                <p style="margin-bottom: 15px;"><i class="fas fa-map-marker-alt" style="color: var(--gold); margin-right: 10px;"></i> Maharashtra, India</p>
            </div>
            <form id="contactForm">
                <div class="form-group">
                    <input type="text" id="name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <input type="email" id="email" placeholder="Your Email">
                </div>
                <div class="form-group">
                    <textarea id="message" rows="5" placeholder="Your Message" required></textarea>
                </div>
                <button type="submit" class="btn-gold">Send Message</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 harshh_b_arts | Harshal Borase. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
